<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  /* ============================================================
     MALLKI GLAMPING · CINE BAJO LAS ESTRELLAS
     Tokens de diseño
     - Fondo:      #0b0d0c (negro-verdoso, noche de bosque)
     - Superficie: #161a17 (tarjetas)
     - Superficie2:#1f2420 (bordes/hover)
     - Dorado:     #cf9f4e (proyector / brasas)
     - Madera:     #8a5a35 (acento cálido secundario)
     - Texto:      #f1ece0 (blanco cálido)
     - Texto tenue:#a49c8c
     Tipografía:
     - Display: 'Playfair Display' (cine clásico, elegante)
     - Cuerpo:  'Poppins'
     - Utilidad:'Space Mono' (ficha técnica: duración/género, estilo boleto)
     ============================================================ */
  :root{
    --bg: #194342;
    --bg-alt: #0e1210;
    --surface: #161a17;
    --surface-2: #1f2420;
    --gold: #cf9f4e;
    --gold-soft: #e6c887;
    --wood: #8a5a35;
    --text: #f1ece0;
    --text-dim: #a49c8c;
    --line: #2a2e29;
    --shadow: rgba(0,0,0,0.55);
    --radius: 14px;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ---------- Fondo de estrellas (sutil, decorativo) ---------- */
  .stars{
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,.55), transparent 60%),
      radial-gradient(1.5px 1.5px at 70% 15%, rgba(255,255,255,.4), transparent 60%),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,.5), transparent 60%),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.35), transparent 60%),
      radial-gradient(1.5px 1.5px at 55% 45%, rgba(255,255,255,.45), transparent 60%),
      radial-gradient(1px 1px at 10% 65%, rgba(255,255,255,.3), transparent 60%),
      radial-gradient(1px 1px at 92% 85%, rgba(255,255,255,.4), transparent 60%);
    background-repeat: repeat;
    background-size: 100% 100%;
    animation: twinkle 6s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes twinkle{
    from{ opacity:.55; }
    to{ opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce){
    .stars{ animation: none; opacity: .75; }
    html{ scroll-behavior: auto; }
  }

  .wrap{
    position: relative;
    z-index: 1;
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ---------- Encabezado ---------- */
  header{
    text-align: center;
    padding: 56px 16px 32px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 32px;
  }

  .brand-eyebrow{
    font-family: 'Space Mono', monospace;
    letter-spacing: .35em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 10px;
  }

  h1{
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-style: italic;
    font-size: clamp(28px, 6vw, 46px);
    line-height: 1.15;
    margin: 0 0 14px;
    color: var(--text);
  }
  h1 span{ color: var(--gold-soft); }

  header p.subtitle{
    max-width: 560px;
    margin: 0 auto;
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ---------- Buscador y filtros ---------- */
  .controls{
    position: sticky;
    top: 0;
    z-index: 5;
    background: linear-gradient(to bottom, var(--bg) 70%, transparent);
    padding: 14px 0 18px;
    margin-bottom: 8px;
  }

  .search-box{
    position: relative;
    max-width: 480px;
    margin: 0 auto 16px;
  }

  .search-box input{
    width: 100%;
    padding: 13px 16px 13px 42px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .search-box input::placeholder{ color: var(--text-dim); }
  .search-box input:focus{
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(207,159,78,.18);
  }
  .search-box svg{
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: var(--text-dim);
  }

  .filters{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .filter-btn{
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .2s ease;
  }
  .filter-btn:hover{
    border-color: var(--gold);
    color: var(--gold-soft);
  }
  .filter-btn.active{
    background: var(--gold);
    border-color: var(--gold);
    color: #1a1200;
    font-weight: 700;
  }
  .filter-btn:focus-visible,
  .search-box input:focus-visible,
  .whatsapp-btn:focus-visible{
    outline: 2px solid var(--gold-soft);
    outline-offset: 2px;
  }

  /* ---------- Cuadrícula ---------- */
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 26px;
    margin-top: 24px;
  }

  /* Tarjeta estilo "boleto de cine": borde perforado + línea de corte */
  .card{
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: 0 10px 30px var(--shadow);
    display: flex;
    flex-direction: column;
    transition: transform .25s ease, border-color .25s ease;
  }
  .card:hover{
    transform: translateY(-4px);
    border-color: var(--wood);
  }

  .poster{
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    overflow: hidden;
    background: var(--surface-2);
  }
  .poster img{
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .4s ease;
  }
  .card:hover .poster img{ transform: scale(1.05); }

  .genre-tag{
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(11,13,12,.8);
    backdrop-filter: blur(3px);
    border: 1px solid var(--gold);
    color: var(--gold-soft);
    font-family: 'Space Mono', monospace;
    font-size: 10.5px;
    letter-spacing: .05em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
  }

  .ticket-tear{
    position: relative;
    height: 0;
    border-top: 2px dashed var(--line);
    margin: 0 16px;
  }
  .ticket-tear::before,
  .ticket-tear::after{
    content: "";
    position: absolute;
    top: -9px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--line);
  }
  .ticket-tear::before{ left: -25px; }
  .ticket-tear::after{ right: -25px; }

  .card-body{
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .card-title{
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 20px;
    margin: 0 0 6px;
    color: var(--text);
  }

  .meta-row{
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--gold-soft);
    margin-bottom: 12px;
  }
  .meta-row .dot{ color: var(--text-dim); }

  .synopsis{
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text-dim);
    margin: 0 0 20px;
    flex: 1;
  }

  .whatsapp-btn{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px 16px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--wood) 130%);
    color: #1a1200;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform .15s ease, filter .15s ease;
  }
  .whatsapp-btn:hover{ filter: brightness(1.08); transform: translateY(-1px); }
  .whatsapp-btn:active{ transform: translateY(0); }
  .whatsapp-btn svg{ width: 18px; height: 18px; flex-shrink: 0; }

  /* ---------- Sin resultados ---------- */
  .empty-state{
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state p.big{
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--gold-soft);
    margin-bottom: 6px;
  }

  footer{
    text-align: center;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: .05em;
  }

  /* ---------- Responsive: celular primero en la práctica ---------- */
  @media (max-width: 480px){
    header{ padding: 40px 12px 24px; }
    .grid{ grid-template-columns: 1fr; gap: 20px; }
    .ticket-tear::before{ left: -20px; }
    .ticket-tear::after{ right: -20px; }
  }
</style>
</head>

/* ================================================================
   LÓGICA DE LA APLICACIÓN
================================================================= */

let filtroActivo = "Todas";
let textoBusqueda = "";

// --- Construir dinámicamente los botones de filtro según los géneros existentes ---
function inicializarFiltros(){
  const generos = ["Todas", ...new Set(peliculas.map(p => p.genero))];
  const contenedor = document.getElementById("filterButtons");
  contenedor.innerHTML = generos.map(g => `
    <button class="filter-btn ${g === filtroActivo ? 'active' : ''}" data-genero="${g}">
      ${g}
    </button>
  `).join("");

  contenedor.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      filtroActivo = btn.dataset.genero;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderizarPeliculas();
    });
  });
}

// --- Generar el mensaje de WhatsApp y abrir el enlace ---
function reservarPelicula(titulo){
  const mensaje = `¡Hola Mallki Glamping! Ya estoy instalado/a en mi cabaña y he elegido la película: ${titulo}.`;
  const mensajeCodificado = encodeURIComponent(mensaje);
  const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${mensajeCodificado}`;
  window.open(url, "_blank");
}

// --- Crear el HTML de una tarjeta de película ---

  return `
    <article class="card">
      <div class="poster">
        <img src="${pelicula.imagen}" alt="Póster de ${pelicula.titulo}" loading="lazy">
        <span class="genre-tag">${pelicula.genero}</span>
      </div>
      <div class="ticket-tear" aria-hidden="true"></div>
      <div class="card-body">
        <h2 class="card-title">${pelicula.titulo}</h2>
        <div class="meta-row">
          <span>${pelicula.duracion}</span>
          <span class="dot">•</span>
          <span>${pelicula.genero}</span>
        </div>
        <p class="synopsis">${pelicula.descripcion}</p>
        <button class="whatsapp-btn" onclick="reservarPelicula('${pelicula.titulo.replace(/'/g, "\\'")}')">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

}

// --- Filtrar y renderizar la cuadrícula completa ---
function renderizarPeliculas(){
  const grid = document.getElementById("movieGrid");

  const resultado = peliculas.filter(p => {
    const coincideGenero = filtroActivo === "Todas" || p.genero === filtroActivo;
    const coincideBusqueda = p.titulo.toLowerCase().includes(textoBusqueda.toLowerCase());
    return coincideGenero && coincideBusqueda;
  });

  if(resultado.length === 0){
    grid.innerHTML = `
      <div class="empty-state">
        <p class="big">No encontramos esa película</p>
        <p>Prueba con otro título o revisa otra categoría.</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = resultado.map(crearTarjeta).join("");
}

// --- Buscador en tiempo real ---
document.getElementById("searchInput").addEventListener("input", (e) => {
  textoBusqueda = e.target.value;
  renderizarPeliculas();
});

// --- Inicializar la página ---
inicializarFiltros();
renderizarPeliculas();
</script>
